<main class="w-full max-w-[1000px] flex rounded-2xl overflow-hidden glass-panel soft-shadow relative z-10 flex-col md:flex-row min-h-[600px]">
<!-- Illustration / Brand Side (Hidden on Mobile) -->
<div class="hidden md:flex md:w-1/2 bg-surface-container-lowest p-xl flex-col items-center justify-center relative overflow-hidden border-r border-outline-variant/30">
<div class="relative z-10 flex flex-col items-center text-center max-w-sm">
<img alt="SafeSchool Hub Logo" class="h-32 w-auto mb-lg object-contain drop-shadow-sm" src="https://lh3.googleusercontent.com/aida/AP1WRLtPJwzVyu0SJ8xN45WKCzH5KMeKK9K9uX29vpMTR6sWzLoA9dO7QdMLuGG-hA6QAMeI9pcSIaaiX60Xc-1pydPPs3WSF2AmHHz_HNtRG9ZV9mtQdKsVnOAnlu-xbXxQEnxRsyEquWNS5_NxMnROStalzNPPc7_kp-qNq7X-kdqE5-KUzG5XWST6nkVbAGS4vhFK0fqwGS8sik6exrBr08rd84Xkqw74sCEYy5vQ1WmhTRdqGGyrYVPBBdc">
<h2 class="text-headline-lg font-headline-lg text-primary mb-sm">Không gian số an toàn của bạn</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Nơi kết nối, chia sẻ và nhận hỗ trợ kịp thời.</p>
</div>
<!-- Abstract decorative elements to soften the clinical feel -->
<div class="absolute bottom-0 right-0 w-64 h-64 bg-primary-container rounded-tl-full opacity-10 pointer-events-none"></div>
<div class="absolute top-10 left-10 w-32 h-32 bg-secondary rounded-full opacity-10 blur-2xl pointer-events-none"></div>
</div>
<!-- Login Form Side -->
<div class="w-full md:w-1/2 p-xl md:p-2xl flex flex-col justify-center bg-surface-container-lowest relative">
<div class="md:hidden flex justify-center mb-lg">
<img alt="SafeSchool Hub Logo" class="h-20 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLtPJwzVyu0SJ8xN45WKCzH5KMeKK9K9uX29vpMTR6sWzLoA9dO7QdMLuGG-hA6QAMeI9pcSIaaiX60Xc-1pydPPs3WSF2AmHHz_HNtRG9ZV9mtQdKsVnOAnlu-xbXxQEnxRsyEquWNS5_NxMnROStalzNPPc7_kp-qNq7X-kdqE5-KUzG5XWST6nkVbAGS4vhFK0fqwGS8sik6exrBr08rd84Xkqw74sCEYy5vQ1WmhTRdqGGyrYVPBBdc">
</div>
<div class="mb-xl text-center md:text-left">
<h1 class="text-headline-xl-mobile md:text-headline-xl font-headline-xl-mobile md:font-headline-xl text-on-surface mb-xs">Chào mừng bạn trở lại</h1>
<p class="text-body-md font-body-md text-on-surface-variant flex items-center justify-center md:justify-start gap-xs">
<span class="material-symbols-outlined text-secondary" style="font-size: 18px;">shield_locked</span>
                    Đăng nhập bảo mật
                </p>
</div>
<form action="#" class="space-y-lg" method="POST">
<!-- Input Fields -->
<div class="space-y-md">
<div>
<label class="block text-label-md font-label-md text-on-surface mb-xs" for="identifier">Email hoặc Mã học sinh</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="identifier" name="identifier" placeholder="Nhập email hoặc mã của bạn" type="text">
</div>
</div>
<div>
<label class="block text-label-md font-label-md text-on-surface mb-xs" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface-variant transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-low cursor-pointer" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block text-label-sm font-label-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Ghi nhớ đăng nhập
                        </label>
</div>
<div class="text-sm">
<a class="text-label-md font-label-md text-primary hover:text-primary-container transition-colors" href="#">
                            Quên mật khẩu?
                        </a>
</div>
</div>
<!-- Primary Action -->
<div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg text-label-md font-label-md text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary interactive-shadow transition-all duration-200" type="submit">
                        Đăng nhập
                    </button>
</div>
</form>
<div class="mt-xl relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest text-label-sm font-label-sm text-outline">Hoặc tiếp tục với</span>
</div>
</div>
<!-- Alternative Logins -->
<div class="mt-lg grid grid-cols-2 gap-md">
<button class="flex items-center justify-center w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-label-md font-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200" type="button">
<span class="material-symbols-outlined mr-2" style="color: #DB4437;">g_translate</span> <!-- Rough Google approximation with material icon -->
                    Google
                </button>
<button class="flex items-center justify-center w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest text-label-md font-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200" type="button">
<span class="material-symbols-outlined mr-2 text-primary">school</span>
                    Tài khoản trường
                </button>
</div>
<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 flex flex-wrap justify-between items-center text-label-sm font-label-sm text-outline gap-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 16px;">privacy_tip</span>
<a class="hover:text-on-surface-variant transition-colors" href="#">Chính sách bảo mật</a>
</div>
<a class="hover:text-on-surface-variant transition-colors flex items-center gap-xs" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">help</span>
                    Hỗ trợ
                </a>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
